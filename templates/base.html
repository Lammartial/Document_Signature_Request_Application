<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}DocSign{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom bg-white">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'signing:dashboard' %}">DocSign</a>
            <div class="ms-auto d-flex gap-3 align-items-center">
                {% if request.user.is_authenticated %}
                    <span class="text-muted small">{{ request.user.email|default:request.user.username }}</span>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="btn btn-sm btn-outline-secondary" type="submit">Logout</button>
                    </form>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="py-4">
        <div class="container">
            {% if messages %}
                <div class="mb-3">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags|default:'info' }} mb-2">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
